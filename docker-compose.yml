services:
  db:
    image: postgis/postgis:16-3.5-alpine
    container_name: pse-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: pse-api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-pse}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cambia-esta-clave-jwt-en-produccion}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db-backup:
    image: postgis/postgis:16-3.5-alpine
    container_name: pse-db-backup
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pse}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_TIME: ${BACKUP_TIME:-03:00}
      BACKUP_RUN_ON_STARTUP: ${BACKUP_RUN_ON_STARTUP:-false}
    volumes:
      - ./backups:/backups
      - ./docker/db-backup.sh:/usr/local/bin/db-backup.sh:ro
      - ./docker/backup-scheduler.sh:/usr/local/bin/backup-scheduler.sh:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "/usr/local/bin/backup-scheduler.sh"]
    restart: unless-stopped

volumes:
  postgres_data:
